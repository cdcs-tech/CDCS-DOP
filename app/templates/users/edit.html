{% extends "base.html" %}

{% block title %}Edit User{% endblock %}

{% block content %}

<div class="container mt-4">

<h2>Edit User</h2>

<hr>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">

            Full Name

        </label>

        <input
            type="text"
            name="full_name"
            value="{{ user.full_name }}"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Email

        </label>

        <input
            type="email"
            name="email"
            value="{{ user.email }}"
            class="form-control"
            required>

    </div>

    <div class="form-check mb-3">

        <input
            class="form-check-input"
            type="checkbox"
            name="is_active"

            {% if user.is_active %}
                checked
            {% endif %}>

        <label class="form-check-label">

            Active

        </label>

    </div>

    <button
        type="submit"
        class="btn btn-success">

        Save Changes

    </button>

    <a
        href="{{ url_for('users.detail', user_id=user.id) }}"
        class="btn btn-secondary">

        Cancel

    </a>

</form>

</div>

{% endblock %}
