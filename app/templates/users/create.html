{% extends "base.html" %}

{% block title %}Create User{% endblock %}

{% block content %}

<div class="container mt-4">

<h2>Create User</h2>

<hr>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">

            Full Name

        </label>

        <input
            type="text"
            name="full_name"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Email

        </label>

        <input
            type="email"
            name="email"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Password

        </label>

        <input
            type="password"
            name="password"
            class="form-control"
            required>

    </div>

    <button
        type="submit"
        class="btn btn-primary">

        Create User

    </button>

    <a
        href="{{ url_for('users.index') }}"
        class="btn btn-secondary">

        Cancel

    </a>

</form>

</div>

{% endblock %}
